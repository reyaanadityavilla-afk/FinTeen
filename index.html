<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#081d4d">
  <title>FinTeen AI</title>
  <link rel="icon" href="assets/finteen-icon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Manrope:wght@600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar">
      <a class="brand" href="#" data-view="dashboard" aria-label="FinTeen AI home">
        <img class="brand-logo" src="assets/finteen-icon.png" alt="">
        <span><strong>FinTeen</strong><small>AI</small></span>
      </a>

      <nav class="main-nav" aria-label="Main navigation">
        <button class="nav-item active" data-view="dashboard"><span class="nav-icon">⌂</span>Overview</button>
        <button class="nav-item" data-view="learn"><span class="nav-icon">▤</span>Learn</button>
        <button class="nav-item" data-view="simulator"><span class="nav-icon">◫</span>Budget Lab</button>
        <button class="nav-item" data-view="savings"><span class="nav-icon">◉</span>Savings Analyzer</button>
        <button class="nav-item" data-view="tutor"><span class="nav-icon">✦</span>AI Tutor</button>
        <button class="nav-item" data-view="careers"><span class="nav-icon">⌁</span>Career Explorer</button>
      </nav>

      <button class="sidebar-card lessons-counter" data-view="learn" aria-label="Open completed lessons">
        <div class="mini-orbit">0</div>
        <p><strong>Weekly goal</strong><br><span>3 of 4 lessons done</span></p>
      </button>

      <div class="sidebar-footer">
        <div class="avatar">RV</div>
        <div><strong>New learner</strong><small>New learner</small></div>
        <button aria-label="Settings">•••</button>
      </div>
    </aside>

    <main class="main">
      <header class="topbar">
        <button class="mobile-menu" aria-label="Open menu">☰</button>
        <div class="breadcrumb"><span>FinTeen AI</span><strong id="page-title">Overview</strong></div>
        <div class="top-actions">
          <button class="learner-count" id="learner-count" title="Successful sign-ins on this app"><span>◎</span><strong>0</strong><small>learners joined</small></button>
          <div class="streak hidden"><span>◆</span><strong></strong><small>day streak</small></div>
          <button class="icon-button" aria-label="Notifications">◌<span class="notification-dot"></span></button>
          <div class="avatar small">RV</div>
        </div>
      </header>

      <div id="view-container"></div>
      <footer class="site-credit">Made by Reyaan Aditya Villa</footer>
    </main>
  </div>

  <div id="toast" class="toast" role="status"></div>
  <script src="lesson-data.js"></script>
  <script src="personal-finance-data.js"></script>
  <script src="investing-data.js"></script>
  <script src="business-data.js"></script>
  <script src="accounting-data.js"></script>
  <script src="advanced-finance-data.js"></script>
  <script src="career-data.js"></script>
  <script src="app.js"></script>
</body>
</html>
